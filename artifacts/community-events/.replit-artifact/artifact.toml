kind = "mobile"
previewPath = "/"
title = "Community Events"
version = "1.0.0"
id = "artifacts/community-events"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19747

[services.development]
run = "pnpm --filter @workspace/community-events run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community-events", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/community-events", "run", "serve" ]

[services.env]
PORT = "19747"
BASE_PATH = "/"
